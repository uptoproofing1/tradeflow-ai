<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <radialGradient id="M1Bg" cx="35%" cy="28%" r="90%">
      <stop offset="0%" stop-color="#3a6ee0"/>
      <stop offset="50%" stop-color="#1a45c8"/>
      <stop offset="100%" stop-color="#0e2d9e"/>
    </radialGradient>
    <radialGradient id="M1QSh" cx="68%" cy="68%" r="55%">
      <stop offset="0%" stop-color="rgba(8,24,80,.45)"/>
      <stop offset="100%" stop-color="rgba(8,24,80,0)"/>
    </radialGradient>
    <linearGradient id="M1S1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00c8ff" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#0868d8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="M1S2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d8ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00aaee" stop-opacity=".88"/>
      <stop offset="100%" stop-color="#0558c0" stop-opacity="0"/>
    </linearGradient>
    <filter id="M1Gl" x="-15%" y="-300%" width="130%" height="700%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feFlood flood-color="#00e8ff" flood-opacity=".9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="M1Dr" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="7" flood-color="#040e40" flood-opacity=".6"/>
    </filter>
  </defs>

  <!-- Full-bleed background: the platform applies the mask, so no rounded corners here -->
  <rect width="200" height="200" fill="url(#M1Bg)"/>

  <!-- Logo content scaled to ~72% and centred, keeping it inside the maskable safe zone -->
  <g transform="translate(100,100) scale(0.72) translate(-100,-100)">
    <ellipse cx="65" cy="38" rx="68" ry="34" fill="rgba(255,255,255,.11)"/>

    <path d="M 104 157 C 116 172, 150 132, 196 144"
      fill="none" stroke="url(#M1S1)" stroke-width="15"
      stroke-linecap="round" filter="url(#M1Gl)"/>
    <path d="M 107 155 C 118 170, 149 133, 192 143"
      fill="none" stroke="rgba(255,255,255,.7)" stroke-width="5"
      stroke-linecap="round"/>

    <path d="M 111 174 C 123 190, 160 150, 196 160"
      fill="none" stroke="url(#M1S2)" stroke-width="11"
      stroke-linecap="round" filter="url(#M1Gl)"/>
    <path d="M 114 173 C 125 188, 159 151, 192 159"
      fill="none" stroke="rgba(255,255,255,.55)" stroke-width="3.5"
      stroke-linecap="round"/>

    <g filter="url(#M1Dr)">
      <path d="M 119 140 A 54 54 0 1 0 101 147"
        fill="none" stroke="#ffffff" stroke-width="27" stroke-linecap="round"/>
      <path d="M 119 140 A 54 54 0 1 0 101 147"
        fill="none" stroke="url(#M1QSh)" stroke-width="27"/>
      <path d="M 119 140 A 54 54 0 1 0 101 147"
        fill="none" stroke="rgba(255,255,255,.7)" stroke-width="10"/>

      <line x1="101" y1="147" x2="157" y2="180"
        stroke="#ffffff" stroke-width="27" stroke-linecap="round"/>
      <line x1="97" y1="147" x2="151" y2="178"
        stroke="rgba(255,255,255,.5)" stroke-width="7" stroke-linecap="round"/>
      <line x1="106" y1="148" x2="162" y2="181"
        stroke="rgba(6,18,70,.3)" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
