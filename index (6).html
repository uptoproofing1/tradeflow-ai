// ═══════════════════════════════════════════════════════════
// VOICE ENGINE — ElevenLabs via backend
// ═══════════════════════════════════════════════════════════
const voiceCfg = () => DB.get("voice", { on:true, accent:"nz", gender:"m", style:"tradie", speed:1.0 });
let currentAudio = null;

const styleText = (text, style) => {
  if (style !== "tradie") return text;
  return text
    .replace(/Good morning/g, "G'day")
    .replace(/Good afternoon/g, "Hey, afternoon")
    .replace(/Good evening/g, "Evening")
    .replace(/Thank you/g, "Cheers")
    .replace(/Please /g, "Just ")
    .replace(/generating/gi, "sorting")
    .replace(/professional/gi, "")
    .trim();
};

const speak = async (raw) => {
  const cfg = voiceCfg();
  if (!cfg.on) return;
  const text = styleText(raw, cfg.style);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  try {
    const res = await fetch(`${API}/api/speak`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ text, accent:cfg.accent, gender:cfg.gender, style:cfg.style, speed:cfg.speed }),
    });
    if (!res.ok) throw new Error(res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.volume = 1;
    currentAudio.play();
    currentAudio.onended = () => URL.revokeObjectURL(url);
  } catch {
    // Silent browser fallback
    if (!window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = cfg.speed; u.pitch = cfg.gender === "f" ? 1.1 : 0.88;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => /daniel|alex|gordon|karen/i.test(v.name) && v.lang.startsWith("en"));
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }
};

function PinLock({ onUnlock }) {
  const [pin, setPin] = useState([]);
  const [err, setErr] = useState("");
  const [shake, setShake] = useState(false);
  const correctPin = DB.get("pin", "1234");
  const now = new Date();
  const h12 = now.getHours() % 12 || 12;
  const mn = String(now.getMinutes()).padStart(2, "0");
  const ap = now.getHours() >= 12 ? "PM" : "AM";
  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const press = (k) => {
    if (pin.length >= 4) return;
    const next = [...pin, k];
    setPin(next);
    setErr("");
    if (next.length === 4) {
      setTimeout(() => {
        if (next.join("") === correctPin) {
          onUnlock();
        } else {
          setShake(true);
          setErr("Incorrect PIN");
          setTimeout(() => { setPin([]); setShake(false); }, 600);
        }
      }, 80);
    }
  };

  const del = () => { setPin(p => p.slice(0, -1)); setErr(""); };
  const LABELS = ["","ABC","DEF","GHI","JKL","MNO","PQRS","TUV","WXYZ"];

  return (

// 02 JOBS PIPELINE
// ═══════════════════════════════════════════════════════════
function Jobs({ goTo, jobs, setJobs }) {
  const [filter, setFilter] = useState("All");
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ title:"", client:"", value:"", status:"Lead" });

  const list = filter === "All" ? jobs : jobs.filter(j => j.status === filter);

  const addJob = () => {
    if (!form.title || !form.client) return;
    const newJob = { id:Date.now(), ...form, value:parseFloat(form.value)||0, createdAt:new Date().toISOString() };
    setJobs(j => { const u=[...j,newJob]; DB.set("jobs",u); return u; });
    setForm({ title:"", client:"", value:"", status:"Lead" });
    setShowAdd(false);
  };

  const deleteJob = (id) => { setJobs(j => { const u=j.filter(x=>x.id!==id); DB.set("jobs",u); return u; }); };
  const updateStatus = (id, status) => { setJobs(j => { const u=j.map(x=>x.id===id?{...x,status}:x); DB.set("jobs",u); return u; }); };

  const stages = ["Lead","Booked","In Progress","Completed"];
  const stageCounts = stages.map(s => jobs.filter(j => j.status === s).length);

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="Jobs Pipeline" action={<PlusBtn onClick={() => setShowAdd(true)} />} />

      {/* Stage counts */}
      <div style={{ display:"flex", gap:10, margin:"0 16px 12px" }}>
        {stages.map((s,i) => (
          <div key={s} style={{ flex:1, ...S.card, padding:"8px 4px", textAlign:"center" }}>
            <div style={{ fontSize:20, fontWeight:900, color:["#fbbf24","#4ade80","#60a5fa","#a1a1aa"][i] }}>{stageCounts[i]}</div>
            <div style={{ fontSize:9, color:"#52525b", marginTop:2 }}>{s}</div>
          </div>
        ))}
      </div>

      <Pills opts={["All","Lead","Booked","In Progress","Completed"]} val={filter} onChange={setFilter} />

      {/* Add job form */}
      {showAdd && (
        <Card style={{ margin:"8px 16px", padding:16 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:12 }}>+ New Job</div>
          <Input label="Job Title" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Roof Replacement" />
          <Input label="Client Name" value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="e.g. John Smith" />
          <Input label="Value ($)" type="number" value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))} placeholder="0.00" />
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#71717a", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Stage</div>
            <div style={{ display:"flex", gap:6 }}>
              {stages.map(s=><button key={s} onClick={()=>setForm(f=>({...f,status:s}))} style={{ ...S.btn, fontSize:11, padding:"6px 10px", borderRadius:8, background:form.status===s?"#2563eb":"#27272a", color:form.status===s?"#fff":"#71717a" }}>{s}</button>)}
            </div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setShowAdd(false)} style={{ ...S.btn, flex:1, padding:"10px", borderRadius:12, background:"#27272a", color:"#71717a", fontSize:13 }}>Cancel</button>
            <button onClick={addJob} style={{ ...S.btn, flex:1, padding:"10px", borderRadius:12, background:"#2563eb", color:"#fff", fontSize:13 }}>Add Job</button>
          </div>
        </Card>
      )}

      <Card style={{ margin:"8px 16px 16px" }}>
        {list.length === 0
          ? <EmptyState icon="jobs" title="No jobs yet" sub="Tap + to add a job or use Voice Quote to create one from speech" />
          : list.map((j,i) => (
            <div key={j.id} style={{ padding:16, ...(i<list.length-1?S.divider:{}) }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:8 }}>
                <div style={{ flex:1, minWidth:0, marginRight:8 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{j.title}</div>
                  <div style={{ fontSize:11, color:"#71717a", marginTop:1 }}>{j.client}</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <Badge s={j.status} />
                  <button onClick={() => deleteJob(j.id)} style={{ ...S.btn, background:"none", padding:4 }}>
                    <Icon name="trash" size={14} color="#52525b" />
                  </button>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <span style={{ fontSize:15, fontWeight:900, color:"#60a5fa" }}>${(j.value||0).toLocaleString()}</span>
                <div style={{ display:"flex", gap:5 }}>
                  {stages.filter(s=>s!==j.status).slice(0,2).map(s=>(
                    <button key={s} onClick={()=>updateStatus(j.id,s)} style={{ ...S.btn, fontSize:10, padding:"4px 8px", borderRadius:7, background:"#27272a", color:"#71717a" }}>{s==="In Progress"?"→ Progress":s==="Completed"?"✓ Done":s==="Booked"?"→ Booked":"→ "+s}</button>
                  ))}
                </div>
              </div>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 03 VOICE TO QUOTE
// ═══════════════════════════════════════════════════════════
function Voice({ goTo, jobs, setJobs, materials, profile, gstRate }) {
  const [rec, setRec] = useState(false);
  const [transcript, setTranscript] = useState("");
  const [loading, setLoading] = useState(false);
  const [quote, setQuote] = useState(null);
  const [recTimer, setRecTimer] = useState(0);
  const timerRef = useRef(null);
  const recRef = useRef(null);

  const startRec = () => {
    if (rec) return;
    setRec(true); setTranscript(""); setQuote(null); setRecTimer(0);
    speak("Go for it — tell me about the job.");
    timerRef.current = setInterval(() => setRecTimer(t => t+1), 1000);

    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const r = new SR();
      r.continuous = false; r.interimResults = true; r.lang = "en-NZ";
      r.onresult = (e) => {
        const t = Array.from(e.results).map(r=>r[0].transcript).join(" ");
        setTranscript(t);
      };
      r.onend = () => stopRec();
      r.start();
      recRef.current = r;
    } else {
      // Fallback: manual stop after 10s
      setTimeout(() => stopRec(), 10000);
    }
  };

  const stopRec = () => {
    setRec(false);
    clearInterval(timerRef.current);
    if (recRef.current) { try { recRef.current.stop(); } catch {} }
  };

  const genQuote = async () => {
    if (!transcript) return;
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/quote`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ transcript, materials, profile, gst:gstRate, country:"New Zealand" }),
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      setQuote(data.quote);
      speak("Your quote is ready. Check the details and tap Send when you're happy.");
    } catch {
      // Fallback: basic quote structure from transcript
      const sub = 0;
      setQuote({ client: profile.name || "Client", address:"", items:[{ description: transcript, qty:1, unit_price:0, total:0 }], subtotal:0, gst_rate:gstRate, gst_amount:0, total:0, notes:["Quote valid for 30 days","50% deposit required to secure booking"] });
      speak("Quote created. You'll need to fill in the pricing details.");
    }
    setLoading(false);
  };

  const saveQuote = () => {
    if (!quote) return;
    const qNum = `#Q-${String(DB.get("qSeq",1)).padStart(4,"0")}`;
    DB.set("qSeq", (DB.get("qSeq",1)||1)+1);
    const job = { id:Date.now(), title:quote.items?.[0]?.description||"New Quote", client:quote.client||"Client", status:"Lead", value:quote.total||0, qNum, quote, createdAt:new Date().toISOString() };
    setJobs(j => { const u=[...j,job]; DB.set("jobs",u); return u; });
    speak("Quote saved. You'll find it in Jobs.");
    goTo("jobs");
  };

  const fmt = (n) => `$${(n||0).toFixed(2)}`;
  const mins = Math.floor(recTimer/60);
  const secs = String(recTimer%60).padStart(2,"0");

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="Voice to Quote" onBack={() => goTo("dashboard")} />
      <div style={{ fontSize:13, color:"#71717a", padding:"0 16px 16px" }}>Speak your job naturally — AI builds a professional quote in seconds</div>

      {/* Mic */}
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"0 16px 20px" }}>
        <div style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:16 }}>
          {rec && <>
            <div style={{ position:"absolute", width:180, height:180, borderRadius:"50%", background:"rgba(37,99,235,0.08)", animation:"ripple 1.5s ease-out infinite" }} />
            <div style={{ position:"absolute", width:152, height:152, borderRadius:"50%", background:"rgba(37,99,235,0.12)", animation:"ripple 1.5s ease-out 0.4s infinite" }} />
          </>}
          <button onClick={rec ? stopRec : startRec} style={{ ...S.btn, width:128, height:128, borderRadius:"50%", background:rec?"#dc2626":quote?"#16a34a":"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", zIndex:1, transition:"all 0.2s", boxShadow:rec?"0 0 40px rgba(220,38,38,0.5)":quote?"0 0 40px rgba(22,163,74,0.5)":"0 0 40px rgba(37,99,235,0.5)" }}>
            <Icon name={quote?"check":"mic"} size={48} color="#fff" />
          </button>
        </div>

        <div style={{ fontSize:15, fontWeight:700, color:"#fff" }}>
          {rec ? `Recording... ${mins}:${secs}` : transcript ? "Ready to generate" : "Tap to speak"}
        </div>

        {/* Waveform */}
        <div style={{ display:"flex", alignItems:"center", gap:2, marginTop:12, height:36 }}>
          {Array.from({length:32}).map((_,i) => (
            <div key={i} style={{ width:3, borderRadius:3, background:"#3b82f6", height:rec?`${Math.abs(Math.sin(i*0.5+(Date.now()*0.01)))*18+4}px`:"4px", opacity:rec?1:0.2, transition:"height 0.15s ease" }} />
          ))}
        </div>

        {/* Transcript */}
        {transcript && (
          <div style={{ marginTop:12, width:"100%", padding:"12px 14px", background:"#27272a", border:"1px solid #3f3f46", borderRadius:12, fontSize:13, color:"#a1a1aa", fontStyle:"italic", lineHeight:1.5 }}>
            "{transcript}"
          </div>
        )}

        {/* Actions */}
        {transcript && !quote && (
          <div style={{ display:"flex", gap:10, marginTop:14, width:"100%" }}>
            <button onClick={() => { setTranscript(""); setQuote(null); }} style={{ ...S.btn, flex:1, padding:"12px", borderRadius:14, background:"#27272a", color:"#71717a", fontSize:13 }}>Re-record</button>
            <PrimaryBtn onClick={genQuote} loading={loading} style={{ flex:2 }}>✨ Generate Quote</PrimaryBtn>
          </div>
        )}

        {/* Quote preview */}
        {quote && (
          <div style={{ width:"100%", marginTop:14 }}>
            <Card style={{ padding:16, animation:"fadeIn 0.3s ease" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                <TFLogo size={36} />
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>Quote Preview</div>

              </div>
              {(quote.items||[]).map((item,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:12 }}>
                  <span style={{ color:"#d4d4d8", flex:1 }}>{item.description}</span>

              ))}
              <div style={{ ...S.divider, margin:"10px 0" }} />
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#71717a" }}>
                <span>Subtotal</span><span>{fmt(quote.subtotal)}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#71717a", marginTop:4 }}>
                <span>GST ({quote.gst_rate||15}%)</span><span>{fmt(quote.gst_amount)}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:16, fontWeight:900, color:"#60a5fa", marginTop:8 }}>
                <span>Total</span><span>{fmt(quote.total)}</span>
              </div>
            </Card>
            <div style={{ display:"flex", gap:10, marginTop:10 }}>
              <button onClick={() => { setQuote(null); setTranscript(""); }} style={{ ...S.btn, flex:1, padding:"12px", borderRadius:14, background:"#27272a", color:"#71717a", fontSize:13 }}>Redo</button>
              <PrimaryBtn onClick={saveQuote} style={{ flex:2 }}>Save to Jobs ✓</PrimaryBtn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// 04 INVOICES
// ═══════════════════════════════════════════════════════════
function Invoices({ invoices, setInvoices, jobs }) {
  const [tab, setTab] = useState("All");
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ client:"", amount:"", status:"Sent", due:"" });

  const list = tab === "All" ? invoices : invoices.filter(i => i.status === tab);
  const outstanding = invoices.filter(i => i.status !== "Paid").reduce((a,i) => a+(i.amount||0), 0);

  const addInv = () => {
    if (!form.client || !form.amount) return;
    const inv = { id:Date.now(), ref:`INV-${String(invoices.length+1).padStart(4,"0")}`, ...form, amount:parseFloat(form.amount)||0, createdAt:new Date().toISOString() };
    setInvoices(v => { const u=[...v,inv]; DB.set("invoices",u); return u; });
    setForm({ client:"", amount:"", status:"Sent", due:"" });
    setShowAdd(false);
  };

  const updateStatus = (id, status) => { setInvoices(v => { const u=v.map(x=>x.id===id?{...x,status}:x); DB.set("invoices",u); return u; }); };
  const deleteInv = (id) => { setInvoices(v => { const u=v.filter(x=>x.id!==id); DB.set("invoices",u); return u; }); };

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="Invoices" action={<PlusBtn onClick={() => setShowAdd(!showAdd)} />} />

      <div style={{ margin:"0 16px", borderRadius:18, padding:20, background:"linear-gradient(135deg,rgba(239,68,68,0.12),rgba(127,29,29,0.2))", border:"1px solid rgba(239,68,68,0.3)" }}>
        <div style={{ fontSize:11, fontWeight:700, color:"#fca5a5", textTransform:"uppercase", letterSpacing:"0.08em" }}>Outstanding Balance</div>
        <div style={{ fontSize:32, fontWeight:900, color:"#fff", marginTop:4 }}>${outstanding.toLocaleString("en-NZ",{minimumFractionDigits:0})}</div>
        <div style={{ display:"flex", gap:20, marginTop:8 }}>
          <div><span style={{ color:"#f87171", fontWeight:900 }}>{invoices.filter(i=>i.status==="Overdue").length}</span><span style={{ color:"#52525b", fontSize:12, marginLeft:4 }}>Overdue</span></div>
          <div><span style={{ color:"#fbbf24", fontWeight:900 }}>{invoices.filter(i=>i.status==="Due Soon").length}</span><span style={{ color:"#52525b", fontSize:12, marginLeft:4 }}>Due Soon</span></div>
          <div><span style={{ color:"#4ade80", fontWeight:900 }}>{invoices.filter(i=>i.status==="Paid").length}</span><span style={{ color:"#52525b", fontSize:12, marginLeft:4 }}>Paid</span></div>
        </div>
      </div>

      <Pills opts={["All","Overdue","Due Soon","Sent","Paid"]} val={tab} onChange={setTab} />

      {showAdd && (
        <Card style={{ margin:"8px 16px", padding:16 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:12 }}>+ New Invoice</div>
          <Input label="Client" value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Client name" />
          <Input label="Amount ($)" type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00" />
          <Input label="Due Date" type="date" value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))} />
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#71717a", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Status</div>
            <div style={{ display:"flex", gap:6 }}>
              {["Sent","Due Soon","Overdue"].map(s=><button key={s} onClick={()=>setForm(f=>({...f,status:s}))} style={{ ...S.btn, fontSize:11, padding:"6px 10px", borderRadius:8, background:form.status===s?"#2563eb":"#27272a", color:form.status===s?"#fff":"#71717a" }}>{s}</button>)}
            </div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setShowAdd(false)} style={{ ...S.btn, flex:1, padding:"10px", borderRadius:12, background:"#27272a", color:"#71717a", fontSize:13 }}>Cancel</button>
            <button onClick={addInv} style={{ ...S.btn, flex:1, padding:"10px", borderRadius:12, background:"#2563eb", color:"#fff", fontSize:13 }}>Add Invoice</button>
          </div>
        </Card>
      )}

      <Card style={{ margin:"8px 16px 16px" }}>
        {list.length === 0
          ? <EmptyState icon="doc" title="No invoices yet" sub="Add your first invoice with the + button above" />
          : list.map((inv,i) => (
            <div key={inv.id} style={{ padding:"14px", ...(i<list.length-1?S.divider:{}) }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                <div style={{ flex:1, minWidth:0, marginRight:8 }}>
                  <div style={{ fontSize:11, color:"#52525b" }}>{inv.ref}</div>
                  <div style={{ fontSize:13, fontWeight:600, color:"#fff", marginTop:1 }}>{inv.client}</div>
                  {inv.due && <div style={{ fontSize:11, color:"#71717a" }}>Due {inv.due}</div>}
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>${(inv.amount||0).toLocaleString()}</div>
                  <Badge s={inv.status} />
                </div>
              </div>
              <div style={{ display:"flex", gap:6, marginTop:8 }}>
                {inv.status !== "Paid" && <button onClick={()=>updateStatus(inv.id,"Paid")} style={{ ...S.btn, fontSize:11, padding:"4px 10px", borderRadius:8, background:"rgba(34,197,94,0.15)", color:"#4ade80", border:"1px solid rgba(34,197,94,0.3)" }}>Mark Paid</button>}
                {inv.status === "Sent" && <button onClick={()=>updateStatus(inv.id,"Overdue")} style={{ ...S.btn, fontSize:11, padding:"4px 10px", borderRadius:8, background:"rgba(239,68,68,0.1)", color:"#f87171", border:"1px solid rgba(239,68,68,0.3)" }}>Mark Overdue</button>}
                <button onClick={()=>deleteInv(inv.id)} style={{ ...S.btn, fontSize:11, padding:"4px 8px", borderRadius:8, background:"#27272a", color:"#71717a", marginLeft:"auto" }}>
                  <Icon name="trash" size={13} color="#52525b" />
                </button>
              </div>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

// 05 SAFETY PACK
// ═══════════════════════════════════════════════════════════
function Safety({ goTo, profile }) {
  const [tab, setTab] = useState("Hazards");
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [hazards, setHazards] = useState([]);
  const [toolbox, setToolbox] = useState(null);
  const [workers, setWorkers] = useState(DB.get("workers", []));
  const [country, setCountry] = useState(DB.get("country","New Zealand"));
  const fileRef = useRef();

  const COUNTRIES = {
    "New Zealand":{ code:"HSWA 2015 · NZS 3604", contacts:[{t:"Emergency Services",n:"111",c:"#f87171"},{t:"WorkSafe NZ",n:"0800 030 040",c:"#fbbf24"},{t:"Poison Control",n:"0800 764 766",c:"#c084fc"}] },
    "Australia":{ code:"WHS Act 2011 · Safe Work AU", contacts:[{t:"Emergency Services",n:"000",c:"#f87171"},{t:"Safe Work Helpline",n:"1300 366 979",c:"#fbbf24"},{t:"Poisons Info",n:"13 11 26",c:"#c084fc"}] },
    "United Kingdom":{ code:"HSWA 1974 · HSE Guidelines", contacts:[{t:"Emergency Services",n:"999",c:"#f87171"},{t:"HSE Incident Line",n:"0345 300 9923",c:"#fbbf24"},{t:"NHS Helpline",n:"111",c:"#c084fc"}] },
    "United States":{ code:"OSHA CFR 29 · ANSI", contacts:[{t:"Emergency Services",n:"911",c:"#f87171"},{t:"OSHA Hotline",n:"1-800-321-6742",c:"#fbbf24"},{t:"Poison Control",n:"1-800-222-1222",c:"#c084fc"}] },
  };
  const zoneData = COUNTRIES[country] || COUNTRIES["New Zealand"];

  const addPhoto = () => { fileRef.current.click(); };
  const handlePhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setPhotos(p => [...p, ev.target.result]);
    reader.readAsDataURL(file);
  };

  const analyse = async () => {
    if (!photos.length) return;
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/safety`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ images:photos.slice(0,4), country, legislation:zoneData.code }),
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      setHazards(data.safety?.hazards||[]);
      setToolbox(data.safety?.toolbox||null);
      speak(`Analysis complete. ${(data.safety?.hazards||[]).length} hazards identified.`);
      setTab("Toolbox");
    } catch {
      setHazards([{ name:"⚠️ Analysis unavailable", severity:"Medium", description:"Connect to backend for AI hazard detection", action:"Check site manually and apply standard safety controls" }]);
    }
    setLoading(false);
  };

  const addWorker = () => {
    const name = prompt("Worker name:");
    if (!name) return;
    const role = prompt("Role (e.g. Roofer, Labourer):") || "Worker";
    const w = { id:Date.now(), name, role, signed:false };
    const updated = [...workers, w];
    setWorkers(updated); DB.set("workers", updated);
  };

  const signWorker = (id) => {
    const updated = workers.map(w => w.id===id ? {...w, signed:true, signedAt:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} : w);
    setWorkers(updated); DB.set("workers", updated);
    speak("Signature recorded.");
  };

  const PPE = ["Safety Harness & Lanyard","Hard Hat — AS/NZS 1801","Steel-Capped Boots","Hi-Vis Vest","Safety Glasses","Cut-Resistant Gloves","Hearing Protection","SPF 50+ Sunscreen"];

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="Safety Pack" onBack={() => goTo("dashboard")} />
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"0 16px 10px" }}>
        <span style={{ fontSize:16 }}>🇳🇿</span>
        <span style={{ fontSize:12, color:"#71717a" }}>{zoneData.code}</span>
        <select value={country} onChange={e=>{setCountry(e.target.value);DB.set("country",e.target.value);}} style={{ marginLeft:"auto", fontSize:11, background:"#27272a", border:"1px solid #3f3f46", borderRadius:8, padding:"4px 8px", color:"#d4d4d8", cursor:"pointer" }}>
          {Object.keys(COUNTRIES).map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      <input type="file" ref={fileRef} accept="image/*" capture="environment" onChange={handlePhoto} style={{ display:"none" }} />

      <Pills opts={["Hazards","Toolbox","Emergency","PPE","Sign Off"]} val={tab} onChange={setTab} />

      <div style={{ padding:"8px 16px 16px", display:"flex", flexDirection:"column", gap:10 }}>

        {/* HAZARDS */}
        {tab === "Hazards" && (
          <>
            {/* Photos */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
              {photos.map((p,i) => (
                <div key={i} style={{ aspectRatio:"1", borderRadius:12, overflow:"hidden", border:"1px solid #3f3f46" }}>
                  <img src={p} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                </div>
              ))}
              <button onClick={addPhoto} style={{ ...S.btn, aspectRatio:"1", borderRadius:12, border:"2px dashed #3f3f46", background:"transparent", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, color:"#52525b", fontSize:11 }}>
                <Icon name="camera" size={22} color="#52525b" />
                <span>Add Photo</span>
              </button>
            </div>

            {photos.length > 0 && (
              <PrimaryBtn onClick={analyse} loading={loading}>
                {loading ? "Analysing..." : "🔍 Analyse for Hazards"}
              </PrimaryBtn>
            )}

            {hazards.length > 0
              ? hazards.map((h,i) => (
                <Card key={i} style={{ padding:16 }}>
                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:6 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#fff", flex:1, marginRight:8 }}>{h.name}</div>
                    <Badge s={h.severity} />
                  </div>
                  <div style={{ fontSize:12, color:"#71717a", lineHeight:1.5 }}>{h.description}</div>
                  <div style={{ fontSize:12, color:"#60a5fa", marginTop:6 }}>→ {h.action}</div>
                </Card>
              ))
              : <EmptyState icon="camera" title="No hazards identified yet" sub="Add site photos above then tap Analyse to detect hazards with AI" />
            }
          </>
        )}

        {/* TOOLBOX */}
        {tab === "Toolbox" && (
          toolbox
            ? <Card style={{ padding:16 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#60a5fa", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:12 }}>AI Generated Toolbox Talk</div>
                <div style={{ fontSize:14, fontWeight:700, color:"#fff", marginBottom:12 }}>{toolbox.title || "Site Safety Briefing"}</div>
                {[
                  { h:"Today's Work Plan", items:toolbox.today_plan||[] },
                  { h:"Key Hazards & Controls", items:toolbox.key_hazards||[] },
                  { h:"Emergency Procedures", items:toolbox.emergency_procedures||[] },
                ].map((s,si) => s.items.length > 0 && (
                  <div key={si} style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#52525b", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>{s.h}</div>
                    {s.items.map((item,ii) => (
                      <div key={ii} style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom:6 }}>
                        <div style={{ width:6, height:6, borderRadius:"50%", background:"#3b82f6", marginTop:5, flexShrink:0 }} />
                        <div style={{ fontSize:13, color:"#d4d4d8", lineHeight:1.5 }}>{item}</div>
                      </div>
                    ))}
                  </div>
                ))}
                <PrimaryBtn onClick={() => speak("Toolbox talk complete. All workers must confirm they have understood before starting work.")} style={{ marginTop:8 }}>
                  🔊 Read Aloud
                </PrimaryBtn>
              </Card>
            : <EmptyState icon="shield" title="No toolbox talk yet" sub="Add site photos on the Hazards tab and run AI analysis to auto-generate a toolbox talk" />
        )}

        {/* EMERGENCY */}
        {tab === "Emergency" && (
          <>
            <div style={{ padding:16, borderRadius:16, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)" }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#f87171" }}>🚨 Emergency Contacts — {country}</div>
              <div style={{ fontSize:12, color:"#71717a", marginTop:4 }}>Auto-configured for your legislation zone</div>
            </div>
            {zoneData.contacts.map((c,i) => (
              <Card key={i} style={{ padding:16, display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{c.t}</div>
                  <div style={{ fontSize:18, fontWeight:900, color:c.c, marginTop:2 }}>{c.n}</div>
                </div>
                <button onClick={() => speak(`Calling ${c.t} on ${c.n}`)} style={{ ...S.btn, width:40, height:40, borderRadius:12, background:c.c.replace("#","rgba(").replace(/,.*$/,"")+"0.15)", border:"none", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>📞</button>
              </Card>
            ))}
          </>
        )}

        {/* PPE */}
        {tab === "PPE" && (
          <Card>
            {PPE.map((p,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", ...(i<PPE.length-1?S.divider:{}) }}>
                <div style={{ width:20, height:20, borderRadius:5, background:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <Icon name="check" size={12} color="#fff" />
                </div>
                <span style={{ fontSize:13, color:"#e4e4e7" }}>{p}</span>
              </div>
            ))}
          </Card>
        )}

        {/* SIGN OFF */}
        {tab === "Sign Off" && (
          <>
            <button onClick={addWorker} style={{ ...S.btn, padding:"10px 16px", borderRadius:12, background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.3)", color:"#60a5fa", fontSize:13 }}>+ Add Worker</button>
            {workers.length === 0
              ? <EmptyState icon="user" title="No workers added" sub="Tap + Add Worker to build the sign-off list" />
              : <Card>
                  {workers.map((w,i) => (
                    <div key={w.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"14px", ...(i<workers.length-1?S.divider:{}) }}>
                      <div style={{ width:36, height:36, borderRadius:"50%", background:"rgba(59,130,246,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, color:"#60a5fa", fontSize:13, flexShrink:0 }}>
                        {w.name.split(" ").map(x=>x[0]).join("")}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{w.name}</div>
                        <div style={{ fontSize:11, color:"#71717a" }}>{w.role}{w.signed?` · ✓ Signed ${w.signedAt}`:""}</div>
                      </div>
                      <button onClick={()=>signWorker(w.id)} style={{ ...S.btn, fontSize:11, fontWeight:700, padding:"6px 12px", borderRadius:10, border:"1px solid", borderColor:w.signed?"rgba(34,197,94,0.3)":"transparent", background:w.signed?"rgba(34,197,94,0.15)":"#2563eb", color:w.signed?"#4ade80":"#fff" }}>
                        {w.signed?"✓ Signed":"Tap to Sign"}
                      </button>
                    </div>
                  ))}
                </Card>
            }
            {workers.length > 0 && <PrimaryBtn onClick={()=>window.print()}>Print Sign-Off Sheet</PrimaryBtn>}
          </>
        )}
      </div>
    </div>
  );
}

// 06 AI INVOICE SCANNER
// ═══════════════════════════════════════════════════════════
function Scanner({ goTo, materials, setMaterials }) {
  const [scanned, setScanned] = useState(false);
  const [loading, setLoading] = useState(false);
  const [items, setItems] = useState([]);
  const [supplier, setSupplier] = useState("");
  const fileRef = useRef();

  const handleScan = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      setLoading(true);
      try {
        const res = await fetch(`${API}/api/scan-invoice`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ image:ev.target.result }),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        setItems(data.items||[]);
        setSupplier(data.supplier||"Supplier");
        setScanned(true);
        speak(`Invoice scanned. ${(data.items||[]).length} items found.`);
      } catch {
        setItems([]);
        setScanned(true);
      }
      setLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const addAll = () => {
    const updated = [...materials, ...items.map(it => ({ id:Date.now()+Math.random(), name:it.name, price:it.price, unit:it.unit, supplier, updated:new Date().toLocaleDateString("en-NZ") }))];
    setMaterials(updated); DB.set("materials", updated);
    speak("All prices added to your materials database.");
    goTo("materials");
  };

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="AI Invoice Scanner" onBack={() => goTo("more")} />
      <div style={{ fontSize:13, color:"#71717a", padding:"0 16px 14px" }}>Snap a supplier invoice — AI reads every price and updates your database</div>

      <input type="file" ref={fileRef} accept="image/*" capture="environment" onChange={handleScan} style={{ display:"none" }} />

      <button onClick={() => fileRef.current.click()} style={{ ...S.btn, margin:"0 16px", borderRadius:16, border:"2px dashed #3f3f46", height:176, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:8, background:"transparent", color:"#52525b" }}>
        {loading
          ? <><Spinner /><span style={{ fontSize:13, marginTop:8 }}>Scanning...</span></>
          : scanned
          ? <><div style={{ width:48, height:48, borderRadius:16, background:"rgba(34,197,94,0.2)", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="check" size={24} color="#4ade80" /></div><span style={{ fontSize:13, fontWeight:600, color:"#4ade80" }}>Scanned — tap to scan another</span></>
          : <><Icon name="camera" size={32} color="#52525b" /><span style={{ fontSize:13, fontWeight:500, color:"#71717a" }}>Tap to scan invoice</span><span style={{ fontSize:11, color:"#3f3f46" }}>Camera or gallery</span></>
        }
      </button>

      {scanned && items.length > 0 && (
        <>
          <SecTitle>Extracted — {supplier}</SecTitle>
          <Card style={{ margin:"0 16px" }}>
            {items.map((item,i) => {
              const existing = materials.find(m => m.name.toLowerCase() === item.name?.toLowerCase());
              const priceChanged = existing && Math.abs(existing.price - item.price) > 0.01;
              return (
                <div key={i} style={{ display:"flex", alignItems:"center", padding:"12px 14px", gap:10, ...(i<items.length-1?S.divider:{}) }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:500, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</div>
                    <div style={{ fontSize:11, color:"#71717a", marginTop:1 }}>{item.unit}</div>

// ═══════════════════════════════════════════════════════════
// 07 MILEAGE GPS
// ═══════════════════════════════════════════════════════════
function Mileage({ goTo, trips, setTrips }) {
  const [active, setActive] = useState(false);
  const [km, setKm] = useState(0);
  const [dest, setDest] = useState("");
  const [startTime, setStartTime] = useState(null);
  const [duration, setDuration] = useState(0);
  const timerRef = useRef();
  const watchRef = useRef();

  useEffect(() => {
    return () => { clearInterval(timerRef.current); if (watchRef.current && navigator.geolocation) navigator.geolocation.clearWatch(watchRef.current); };
  }, []);

  const startTrip = () => {
    const d = prompt("Destination / job name:") || "Work Trip";
    setDest(d); setActive(true); setKm(0); setDuration(0);
    setStartTime(Date.now());
    speak(`Trip started. GPS locked on.`);
    timerRef.current = setInterval(() => setDuration(t => t+1), 1000);

    // Real GPS
    if (navigator.geolocation) {
      let lastPos = null;
      watchRef.current = navigator.geolocation.watchPosition(pos => {
        if (lastPos) {
          const d = getDistanceKm(lastPos.coords.latitude, lastPos.coords.longitude, pos.coords.latitude, pos.coords.longitude);
          setKm(k => parseFloat((k+d).toFixed(2)));
        }
        lastPos = pos;
      }, () => {
        // Fallback: simulate
        timerRef.current = setInterval(() => setKm(k => parseFloat((k+0.04).toFixed(2))), 3000);
      }, { enableHighAccuracy:true });
    } else {
      // Simulate
      setInterval(() => setKm(k => parseFloat((k+0.04).toFixed(2))), 3000);
    }
  };

  const getDistanceKm = (lat1,lon1,lat2,lon2) => {
    const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };

  const endTrip = () => {
    setActive(false);
    clearInterval(timerRef.current);
    if (watchRef.current && navigator.geolocation) navigator.geolocation.clearWatch(watchRef.current);
    if (km < 0.1) { speak("Trip too short to log."); return; }
    const trip = { id:Date.now(), dest, km, date:new Date().toISOString(), cost:parseFloat((km*MILEAGE_RATE).toFixed(2)), duration };
    setTrips(t => { const u=[...t,trip]; DB.set("trips",u); return u; });
    speak(`Trip logged. ${km.toFixed(1)} kilometres.`);
    setKm(0); setDest(""); setDuration(0);
  };

  const exportCSV = () => {
    if (!trips.length) { speak("No trips to export yet."); return; }
    const rows = [["Date","Destination","km","Cost ($)","Duration (min)"]];
    trips.forEach(t => rows.push([new Date(t.date).toLocaleDateString("en-NZ"), t.dest, t.km.toFixed(2), t.cost.toFixed(2), Math.round((t.duration||0)/60)]));
    const csv = rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `mileage-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const deleteTrip = (id) => { setTrips(t => { const u=t.filter(x=>x.id!==id); DB.set("trips",u); return u; }); };
  const totalKm = trips.reduce((a,t)=>a+t.km,0);
  const mins = Math.floor(duration/60);
  const secs = String(duration%60).padStart(2,"0");

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="Mileage & GPS" onBack={() => goTo("dashboard")} action={
        <button onClick={exportCSV} style={{ ...S.btn, fontSize:11, color:"#60a5fa", fontWeight:700, padding:"6px 10px", borderRadius:10, background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.3)" }}>
          <Icon name="export" size={13} color="#60a5fa" /> Export
        </button>
      } />

      {/* Live tracker */}
      <Card style={{ margin:"0 16px", padding:16 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
          <span style={{ fontSize:12, color:"#71717a" }}>{active ? `To: ${dest}` : "No trip active"}</span>
          {active && <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ade80", animation:"dotPulse 0.8s ease-in-out infinite" }} />
            <span style={{ fontSize:11, color:"#4ade80" }}>GPS Active</span>
          </div>}
        </div>
        <div style={{ fontSize:44, fontWeight:900, color:"#fff", letterSpacing:"-1px" }}>
          {active ? km.toFixed(1) : "0.0"} <span style={{ fontSize:16, color:"#71717a", fontWeight:400 }}>km</span>
        </div>
        {active && <div style={{ fontSize:12, color:"#71717a", marginTop:4 }}>Duration: {mins}:{secs} · Fuel: ${(km*MILEAGE_RATE).toFixed(2)}</div>}
        <div style={{ display:"flex", gap:10, marginTop:12 }}>
          {!active
            ? <PrimaryBtn onClick={startTrip}>🚗 Start Trip</PrimaryBtn>
            : <>
                <button onClick={()=>{clearInterval(timerRef.current);speak("Trip paused.");}} style={{ ...S.btn, flex:1, padding:"12px", borderRadius:14, background:"#27272a", color:"#71717a", fontSize:13 }}>Pause</button>
                <PrimaryBtn onClick={endTrip} style={{ flex:2, background:"rgba(239,68,68,0.9)", boxShadow:"0 4px 16px rgba(239,68,68,0.3)" }}>⏹ End & Log</PrimaryBtn>
              </>
          }
        </div>
      </Card>

      {/* Summary */}
      <div style={{ display:"flex", gap:10, margin:"12px 16px 0" }}>
        {[{l:"Total km",v:totalKm.toFixed(1),c:"#fbbf24"},{l:"Trips",v:trips.length,c:"#60a5fa"},{l:"IRD claim",v:`$${(totalKm*MILEAGE_RATE).toFixed(0)}`,c:"#4ade80"}].map(s=>(
          <div key={s.l} style={{ flex:1, ...S.card, padding:12 }}>
            <div style={{ fontSize:18, fontWeight:900, color:s.c }}>{s.v}</div>
            <div style={{ fontSize:11, color:"#71717a", marginTop:2 }}>{s.l}</div>
          </div>
        ))}
      </div>

      <SecTitle>Trip Log</SecTitle>
      <Card style={{ margin:"0 16px 16px" }}>
        {trips.length === 0
          ? <EmptyState icon="car" title="No trips logged" sub="Tap Start Trip before driving to a job site" />
          : trips.slice().reverse().map((t,i) => (
            <div key={t.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"14px", ...(i<trips.length-1?S.divider:{}) }}>
              <div style={{ width:36, height:36, borderRadius:10, background:"rgba(245,158,11,0.1)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <Icon name="car" size={16} color="#fbbf24" />
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{t.dest}</div>
                <div style={{ fontSize:11, color:"#71717a" }}>{new Date(t.date).toLocaleDateString("en-NZ")} · {t.km.toFixed(1)} km</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{t.km.toFixed(1)} km</div>
                <div style={{ fontSize:11, color:"#71717a" }}>${t.cost.toFixed(2)}</div>
              </div>
              <button onClick={()=>deleteTrip(t.id)} style={{ ...S.btn, background:"none", padding:4 }}><Icon name="trash" size={14} color="#52525b" /></button>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

// 08 AI EMAIL ASSISTANT
// ═══════════════════════════════════════════════════════════
function Email({ goTo, profile }) {
  const [email, setEmail] = useState("");
  const [reply, setReply] = useState("");
  const [draft, setDraft] = useState("");
  const [loading, setLoading] = useState(false);
  const [sent, setSent] = useState(false);

  const genReply = async () => {
    if (!email && !reply) return;
    setLoading(true); setDraft(""); setSent(false);
    try {
      const res = await fetch(`${API}/api/email`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ incomingEmail:email, replyIntent:reply, senderName:profile.name, companyName:profile.company, style:DB.get("voice",{})?.style||"professional" }),
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      setDraft(data.draft||"");
    } catch {
      setDraft(`Hi,\n\nThank you for getting in touch.\n\n${reply}\n\nCheers,\n${profile.name||"Your Name"}\n${profile.company||""}`);
    }
    setLoading(false);
  };

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="AI Email Assistant" onBack={() => goTo("dashboard")} />

      <div style={{ padding:"0 16px 16px" }}>
        <Textarea label="Incoming Email (paste here)" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Paste the email you received..." rows={4} />
        <Textarea label="What do you want to say?" value={reply} onChange={e=>setReply(e.target.value)} placeholder='e.g. "Thursday works, will include the pergola, cheers"' rows={2} />
        <PrimaryBtn onClick={genReply} loading={loading}>✨ Write AI Reply</PrimaryBtn>

        {draft && (
          <div style={{ marginTop:16, animation:"fadeIn 0.3s ease" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#71717a", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:8 }}>AI Draft Reply</div>
            <div style={{ padding:"14px", background:"#27272a", border:"1px solid #3f3f46", borderRadius:12, fontSize:13, color:"#d4d4d8", lineHeight:1.7, whiteSpace:"pre-wrap" }}>{draft}</div>
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <button onClick={()=>{setDraft("");setEmail("");setReply("");}} style={{ ...S.btn, flex:1, padding:"12px", borderRadius:14, background:"#27272a", color:"#71717a", fontSize:13 }}>Discard</button>
              <PrimaryBtn onClick={()=>{setSent(true);speak("Reply sent.");}} style={{ flex:2, background:sent?"#16a34a":"#2563eb", boxShadow:sent?"none":"0 4px 16px rgba(37,99,235,0.3)" }}>
                {sent ? "✓ Sent" : "Send Reply"}
              </PrimaryBtn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

          <div style={{ width:32, height:32, borderRadius:9, background:"#27272a", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>

// 12 RECEIPT LOGGER — AI powered spending tracker
// ═══════════════════════════════════════════════════════════
function Receipts({ goTo }) {
  const [receipts, setReceipts] = useState(() => DB.get("receipts", []));
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("All");
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ supplier:"", amount:"", category:"Materials", note:"" });
  const fileRef = useRef();

  const CATS = ["Materials","Fuel","Tools","Subcontractors","Insurance","Vehicle","Office","Food","Other"];
  const CAT_COLORS = { Materials:"#60a5fa", Fuel:"#fbbf24", Tools:"#f87171", Subcontractors:"#a78bfa", Insurance:"#4ade80", Vehicle:"#fb923c", Office:"#22d3ee", Food:"#f472b6", Other:"#a1a1aa" };

  const save = (updated) => { setReceipts(updated); DB.set("receipts", updated); };

  // Snap & AI scan
  const handlePhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      setLoading(true);
      try {
        const res = await fetch(`${API}/api/scan-invoice`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ image:ev.target.result, mode:"receipt" }),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        // Extract first item total as receipt amount
        const total = data.items?.reduce((a,i) => a + (i.price||0), 0) || 0;
        const supplier = data.supplier || "Unknown";
        const receipt = {
          id: Date.now(),
          supplier,
          amount: total,
          category: guessCategory(supplier, data.items),
          note: data.items?.map(i=>i.name).join(", ").slice(0,80) || "",
          date: new Date().toISOString(),
          photo: ev.target.result,
          aiScanned: true,
        };
        const updated = [receipt, ...receipts];
        save(updated);
        speak(`Receipt scanned. ${supplier}, $${total.toFixed(2)}, categorised as ${receipt.category}.`);
      } catch {
        // Fallback — open manual form
        setShowAdd(true);
      }
      setLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const guessCategory = (supplier, items) => {
    const s = (supplier + " " + (items||[]).map(i=>i.name).join(" ")).toLowerCase();
    if (/steel|iron|colorbond|timber|plywood|concrete|cement|gib|insulation|pipe|fitting|wire|cable/.test(s)) return "Materials";
    if (/fuel|petrol|diesel|bp|z energy|mobil|gull/.test(s)) return "Fuel";
    if (/tool|makita|dewalt|hilti|screwfix|hardware/.test(s)) return "Tools";
    if (/insurance|aon|lumley|vero/.test(s)) return "Insurance";
    if (/vehicle|tyre|warrant|wof|service|mechanical/.test(s)) return "Vehicle";
    if (/cafe|coffee|food|restaurant|subway|maccas|countdown|pak|supermarket/.test(s)) return "Food";
    if (/office|stationery|paper|cartridge|printer/.test(s)) return "Office";
    return "Other";
  };

  const addManual = () => {
    if (!form.supplier || !form.amount) return;
    const receipt = { id:Date.now(), ...form, amount:parseFloat(form.amount)||0, date:new Date().toISOString(), aiScanned:false };
    const updated = [receipt, ...receipts];
    save(updated);
    setForm({ supplier:"", amount:"", category:"Materials", note:"" });
    setShowAdd(false);
  };

  const del = (id) => save(receipts.filter(r => r.id !== id));

  // Analytics
  const now = new Date();
  const mthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const mthReceipts = receipts.filter(r => new Date(r.date) >= mthStart);
  const mthTotal = mthReceipts.reduce((a,r) => a + (r.amount||0), 0);
  const byCategory = CATS.map(cat => ({
    cat, total: mthReceipts.filter(r=>r.category===cat).reduce((a,r)=>a+(r.amount||0),0),
    count: mthReceipts.filter(r=>r.category===cat).length,
  })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);

  const filtered = tab === "All" ? receipts : receipts.filter(r => r.category === tab);

  // Export CSV
  const exportCSV = () => {
    if (!receipts.length) return;
    const rows = [["Date","Supplier","Category","Amount ($)","Note","AI Scanned"]];
    receipts.forEach(r => rows.push([new Date(r.date).toLocaleDateString("en-NZ"), r.supplier, r.category, (r.amount||0).toFixed(2), r.note||"", r.aiScanned?"Yes":"No"]));
    const csv = rows.map(r => r.map(c=>`"${c}"`).join(",")).join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `receipts-${now.toISOString().slice(0,10)}.csv`;
    a.click();
  };

  return (
    <div style={{ ...S.screen }} className="ns">
      <ScreenHdr title="Receipt Logger" onBack={() => goTo("more")} action={
        <div style={{ display:"flex", gap:6 }}>
          <button onClick={exportCSV} style={{ ...S.btn, fontSize:11, color:"#60a5fa", fontWeight:700, padding:"6px 10px", borderRadius:10, background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.3)" }}>Export</button>
          <PlusBtn onClick={() => setShowAdd(!showAdd)} />
        </div>
      } />

      <input type="file" ref={fileRef} accept="image/*" capture="environment" onChange={handlePhoto} style={{ display:"none" }} />

      {/* Scan button */}
      <button onClick={() => fileRef.current.click()} style={{ ...S.btn, margin:"0 16px 10px", borderRadius:16, padding:16, display:"flex", alignItems:"center", gap:12, background:"linear-gradient(135deg,rgba(37,99,235,0.15),rgba(37,99,235,0.08))", border:"1px solid rgba(59,130,246,0.3)", fontWeight:400, width:"calc(100% - 32px)" }}>
        {loading
          ? <><Spinner /><div style={{ textAlign:"left" }}><div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>AI Scanning...</div><div style={{ fontSize:11, color:"#71717a", marginTop:2 }}>Reading receipt with Claude AI</div></div></>
          : <><div style={{ width:44, height:44, borderRadius:14, background:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, boxShadow:"0 4px 16px rgba(37,99,235,0.4)" }}><Icon name="camera" size={22} color="#fff" /></div>
              <div style={{ textAlign:"left" }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>📸 Snap a Receipt</div>
                <div style={{ fontSize:11, color:"#71717a", marginTop:2 }}>AI reads supplier, amount & auto-categorises</div>
              </div></>
        }
      </button>

      {/* Monthly summary */}
      {mthTotal > 0 && (
        <div style={{ margin:"0 16px 10px", borderRadius:18, padding:16, background:"linear-gradient(135deg,#1565ff 0%,#0d3f9e 60%,#071b3d 100%)" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(147,197,253,0.7)", textTransform:"uppercase", letterSpacing:"0.08em" }}>
            {now.toLocaleDateString("en-NZ",{month:"long",year:"numeric"})} Spending
          </div>
          <div style={{ fontSize:32, fontWeight:900, color:"#fff", marginTop:4 }}>${mthTotal.toLocaleString("en-NZ",{minimumFractionDigits:0})}</div>
          <div style={{ fontSize:12, color:"#93c5fd", marginTop:2 }}>{mthReceipts.length} receipt{mthReceipts.length!==1?"s":""} this month</div>

          {/* Category breakdown bars */}
          {byCategory.length > 0 && (
            <div style={{ marginTop:14 }}>
              {byCategory.slice(0,4).map(c => (
                <div key={c.cat} style={{ marginBottom:8 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:4 }}>
                    <span style={{ color:"rgba(255,255,255,0.7)", fontWeight:600 }}>{c.cat}</span>
                    <span style={{ color:"#fff", fontWeight:700 }}>${c.total.toFixed(0)}</span>
                  </div>
                  <div style={{ height:4, borderRadius:2, background:"rgba(255,255,255,0.15)" }}>
                    <div style={{ height:"100%", borderRadius:2, background:CAT_COLORS[c.cat]||"#60a5fa", width:`${Math.min((c.total/mthTotal)*100,100)}%`, transition:"width 0.5s ease" }} />
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Manual add form */}
      {showAdd && (
        <Card style={{ margin:"0 16px 10px", padding:16, animation:"fadeIn 0.2s ease" }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:12 }}>+ Add Receipt Manually</div>
          <Input label="Supplier / Store" value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))} placeholder="e.g. Bunnings, BP, Steel & Tube" />
          <Input label="Amount ($)" type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00" />
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#71717a", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Category</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {CATS.map(c => (
                <button key={c} onClick={() => setForm(f=>({...f,category:c}))} style={{ ...S.btn, fontSize:11, padding:"5px 10px", borderRadius:8, background:form.category===c?CAT_COLORS[c]:"#27272a", color:form.category===c?"#fff":"#71717a", border:form.category===c?`1px solid ${CAT_COLORS[c]}`:"1px solid #3f3f46", opacity:form.category===c?1:0.8 }}>{c}</button>
              ))}
            </div>
          </div>
          <Input label="Note (optional)" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="What was it for?" />
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setShowAdd(false)} style={{ ...S.btn, flex:1, padding:"10px", borderRadius:12, background:"#27272a", color:"#71717a", fontSize:13 }}>Cancel</button>
            <button onClick={addManual} style={{ ...S.btn, flex:1, padding:"10px", borderRadius:12, background:"#2563eb", color:"#fff", fontSize:13 }}>Add Receipt</button>
          </div>
        </Card>
      )}

      {/* Category filter */}
      <Pills opts={["All",...CATS.filter(c=>receipts.some(r=>r.category===c))]} val={tab} onChange={setTab} />

      {/* Receipt list */}
      <Card style={{ margin:"8px 16px 16px" }}>
        {filtered.length === 0
          ? <EmptyState icon="doc" title="No receipts yet" sub="Snap a receipt with the camera above or add one manually" />
          : filtered.map((r,i) => (
            <div key={r.id} style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"14px", ...(i<filtered.length-1?S.divider:{}) }}>
              {/* Category dot */}
              <div style={{ width:36, height:36, borderRadius:10, background:`${CAT_COLORS[r.category]||"#71717a"}20`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:CAT_COLORS[r.category]||"#71717a" }} />
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                  <div style={{ flex:1, minWidth:0, marginRight:8 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.supplier}</div>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:2 }}>
                      <span style={{ fontSize:11, fontWeight:600, padding:"1px 6px", borderRadius:6, background:`${CAT_COLORS[r.category]||"#71717a"}25`, color:CAT_COLORS[r.category]||"#71717a" }}>{r.category}</span>
                      {r.aiScanned && <span style={{ fontSize:10, color:"#60a5fa" }}>✦ AI</span>}
                    </div>
                    {r.note && <div style={{ fontSize:11, color:"#52525b", marginTop:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.note}</div>}
                    <div style={{ fontSize:11, color:"#3f3f46", marginTop:2 }}>{new Date(r.date).toLocaleDateString("en-NZ",{day:"numeric",month:"short",year:"numeric"})}</div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontSize:14, fontWeight:900, color:"#fff" }}>${(r.amount||0).toFixed(2)}</div>
                    <button onClick={()=>del(r.id)} style={{ ...S.btn, background:"none", padding:4, marginTop:4 }}>
                      <Icon name="trash" size={13} color="#52525b" />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

  const [phase, setPhase] = useState("splash");
  const [screen, setScreen] = useState("dashboard");

  // Global state — all persisted to localStorage
  const [jobs, setJobs]           = useState(() => DB.get("jobs", []));
  const [invoices, setInvoices]   = useState(() => DB.get("invoices", []));
  const [trips, setTrips]         = useState(() => DB.get("trips", []));
  const [materials, setMaterials] = useState(() => DB.get("materials", []));
  const [profile, setProfile]     = useState(() => DB.get("profile", { name:"", company:"", location:"", phone:"" }));
  const [gstRate, setGstRate]     = useState(() => DB.get("gstRate", 0.15));

  const goTo = (s) => setScreen(s);

  const renderScreen = () => {
    const props = { goTo, jobs, setJobs, invoices, setInvoices, trips, setTrips, materials, setMaterials, profile, setProfile, gstRate, setGstRate };
    if (screen === "receipts")      return <Receipts {...props} />;
    if (screen === "dashboard")     return <Dashboard {...props} />;
    if (screen === "jobs")          return <Jobs {...props} />;
    if (screen === "voice")         return <Voice {...props} />;
    if (screen === "invoices")      return <Invoices {...props} />;
    if (screen === "email")         return <Email {...props} />;
    if (screen === "scanner")       return <Scanner {...props} />;
    if (screen === "safety")        return <Safety {...props} />;
    if (screen === "mileage")       return <Mileage {...props} />;
    if (screen === "materials")     return <Materials {...props} />;
    if (screen === "voicesettings") return <VoiceSettings {...props} />;
    if (screen === "settings")      return <Settings {...props} />;
    if (screen === "more")          return <More {...props} />;
    return <Dashboard {...props} />;
  };

  const NAV = [
    { id:"dashboard", l:"Home",     i:"home" },
    { id:"jobs",      l:"Jobs",     i:"jobs" },
    { id:"_fab",      l:"",         i:"mic" },
    { id:"invoices",  l:"Invoices", i:"doc" },
    { id:"more",      l:"More",     i:"more" },
  ];
  const mainScreens = ["dashboard","jobs","invoices","more"];
  const navActive = (id) => id === "more" ? !mainScreens.includes(screen) || screen === "more" : screen === id;

  return (
    <div style={{ minHeight:"100vh", background:"#000", display:"flex", alignItems:"center", justifyContent:"center", padding:8, fontFamily:"'DM Sans',system-ui,sans-serif" }}>
      <style>{GLOBAL_CSS}</style>
      <div style={{ width:"100%", maxWidth:390, height:"min(844px,96vh)", background:"#09090b", display:"flex", flexDirection:"column", position:"relative", overflow:"hidden", borderRadius:44, border:"1px solid rgba(255,255,255,0.06)", boxShadow:"0 30px 80px rgba(0,0,0,0.9)" }}>

        {phase === "splash" && <Splash onDone={() => setPhase("pin")} />}
        {phase === "pin"    && <PinLock onUnlock={() => { setPhase("app"); }} />}

        {phase === "app" && (
          <>
            {/* Status bar */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 24px 4px", flexShrink:0 }}>
              <span style={{ fontSize:14, fontWeight:600, color:"#fff" }}>
                {new Date().getHours()%12||12}:{String(new Date().getMinutes()).padStart(2,"0")}
              </span>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ display:"flex", gap:2, alignItems:"flex-end" }}>{[3,5,7,9].map((h,i)=><div key={i} style={{ width:3,height:h,background:"#fff",borderRadius:1 }}/>)}</div>
                <svg width="15" height="11" viewBox="0 0 15 11" fill="white"><path d="M7.5 2.2C4.9 2.2 2.6 3.3 1 5.1L0 4.1C1.9 1.9 4.5.6 7.5.6s5.6 1.3 7.5 3.5L14 5.1C12.4 3.3 10.1 2.2 7.5 2.2z"/></svg>
                <svg width="25" height="12" viewBox="0 0 25 12" fill="white"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="18" height="8" rx="2" fill="white"/></svg>
              </div>
            </div>

            {/* Screen */}
            <div style={{ flex:1, overflow:"hidden" }}>{renderScreen()}</div>

            {/* Bottom nav */}
            <div style={{ display:"flex", alignItems:"center", padding:"8px 8px 20px", flexShrink:0, background:"rgba(9,9,11,0.97)", borderTop:"1px solid #27272a" }}>
              {NAV.map(tab => {
                if (tab.id === "_fab") return (
                  <div key="_fab" style={{ flex:1, display:"flex", justifyContent:"center" }}>
                    <button onClick={() => goTo("voice")} style={{ ...S.btn, width:56, height:56, borderRadius:"50%", background:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", marginTop:-20, boxShadow:"0 4px 24px rgba(37,99,235,0.5)" }}>
                      <Icon name="mic" size={24} color="#fff" />
                    </button>
                  </div>
                );
                const active = navActive(tab.id);
                return (
                  <button key={tab.id} onClick={() => goTo(tab.id)} style={{ ...S.btn, flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"4px 0", background:"none" }}>
                    <Icon name={tab.i} size={20} color={active?"#60a5fa":"#52525b"} />
                    <span style={{ fontSize:10, fontWeight:700, color:active?"#60a5fa":"#52525b" }}>{tab.l}</span>
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
