<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,textarea,select{font-family:'DM Sans',sans-serif;-webkit-appearance:none}
::-webkit-scrollbar{display:none}
*{-ms-overflow-style:none;scrollbar-width:none}
@keyframes sup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes dp{0%,100%{transform:scale(.5);opacity:.3}50%{transform:scale(1.1);opacity:1}}
@keyframes rip{0%{transform:scale(1);opacity:.4}100%{transform:scale(2.5);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#3f3f46;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;box-shadow:0 0 10px rgba(37,99,235,.5);background:#2563eb}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s ease}
.modal-sheet{background:#18181b;border-radius:20px 20px 0 0;width:100%;max-height:90%;overflow-y:auto;animation:slideUp .25s ease;padding:0 0 40px}
.modal-handle{width:40px;height:4px;background:#3f3f46;border-radius:2px;margin:12px auto 16px}
.inp{width:100%;background:#27272a;border:1px solid #3f3f46;border-radius:12px;padding:13px 14px;font-size:15px;color:#fff;outline:none;display:block;margin-bottom:12px}
.inp:focus{border-color:#2563eb}
.lbl{font-size:11px;font-weight:700;color:#71717a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
</style>
</head>
<body>
<div id="root" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;position:relative"></div>
<div id="modal-root"></div>
<script>
'use strict';

const API='https://tradeflow-api-88z6.onrender.com';
const MRATE=0.31;
const ADMIN_PW='TF@ADMIN.2026';
const TRIAL_DAYS=7;

// ─── STORAGE ─────────────────────────────────────────────
const DB={

// ─── STATE ───────────────────────────────────────────────

  gst:       DB.get('gst',0.15),
  voice:     DB.get('voice',{on:true,accent:'nz',gender:'m',style:'tradie',speed:1.0}),
  theme:     DB.get('theme','Navy'),
  pin:       DB.get('pin','1234'),

  workers:   DB.get('workers',[]),
  authUser:  DB.get('authUser',null),
  authToken: DB.get('authToken',null),
  isAdmin:   DB.get('isAdmin',false),
  subStatus: DB.get('subStatus',null),

  voiceRec:false,voiceText:'',voiceQuote:null,voiceTimer:0,voiceInterval:null,
  safetyTab:'Hazards',safetyPhotos:[],safetyHazards:[],safetyToolbox:null,safetyLoading:false,

  emailDraft:'',emailLoading:false,emailSent:false,
  matSearch:'',
  receiptFilter:'All',receiptLoading:false,

const save=k=>DB.set(k,S[k]);
const go=s=>{S.screen=s;closeModal();renderApp()};

// ─── THEMES ──────────────────────────────────────────────
const THEMES={

const T=()=>THEMES[S.theme]||THEMES['Navy'];

// ─── MODAL SYSTEM ─────────────────────────────────────────
const showModal=html=>{
  const mr=document.getElementById('modal-root');
  if(!mr)return;
  mr.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">${html}</div></div>`;
  // Focus first input after render
  setTimeout(()=>{const inp=mr.querySelector('input,textarea');if(inp)inp.focus();},100);
};
const closeModal=()=>{const mr=document.getElementById('modal-root');if(mr)mr.innerHTML='';};
window.closeModal=closeModal;

// ─── VOICE ENGINE ─────────────────────────────────────────
let curAudio=null;
const styleText=(t,sty)=>{
  if(sty!=='tradie')return t;
  return t.replace(/Good morning/g,"G'day").replace(/Good afternoon/g,"Hey, afternoon").replace(/Thank you/g,"Cheers").replace(/Please /g,"Just ");
};
const speak=async raw=>{
  const v=S.voice;if(!v.on)return;
  const text=styleText(raw,v.style);
  if(curAudio){curAudio.pause();curAudio=null}
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  try{
    const res=await fetch(`${API}/api/speak`,{method:'POST',headers:{'Content-Type':'application/json','Accept':'audio/mpeg'},mode:'cors',body:JSON.stringify({text,accent:v.accent||'nz',gender:v.gender||'m',style:v.style||'tradie',speed:v.speed||1})});
    if(!res.ok)throw new Error(res.status);
    const blob=await res.blob();
    if(blob.size<100)throw new Error('empty');
    const url=URL.createObjectURL(blob);
    curAudio=new Audio(url);curAudio.volume=1;
    await curAudio.play();
    curAudio.onended=()=>URL.revokeObjectURL(url);
  }catch{
    if(!window.speechSynthesis)return;
    const u=new SpeechSynthesisUtterance(text);
    u.rate=v.speed||1;u.pitch=v.gender==='f'?1.1:.88;
    const vs=window.speechSynthesis.getVoices();
    const vv=vs.find(x=>/daniel|alex|gordon/i.test(x.name)&&x.lang.startsWith('en'));
    if(vv)u.voice=vv;
    window.speechSynthesis.speak(u);
  }
};

// ─── UTILS ───────────────────────────────────────────────

const money=(n,c=false)=>'$'+(+(n)||0).toLocaleString('en-NZ',{minimumFractionDigits:c?2:0,maximumFractionDigits:c?2:0});
const dateStr=d=>new Date(d).toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'});
const trialDaysLeft=()=>{if(!S.trialStart)return TRIAL_DAYS;return Math.max(0,TRIAL_DAYS-Math.ceil((Date.now()-S.trialStart)/(864e5)));};

  mail:'M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z',
  scan:'M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z',
  cog:'M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z',
  plus:'M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',

  trash:'M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z',

const ic=(n,sz=20,col='currentColor')=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="${col}"><path d="${IC[n]||IC.more}"/></svg>`;

// ─── AUTH ─────────────────────────────────────────────────

window.doAdmin=()=>{
  const pw=$('a-apw')?.value;
  if(pw===ADMIN_PW){S.isAdmin=true;S.subStatus='active';DB.set('isAdmin',true);DB.set('subStatus','active');S.phase='pin';renderApp();}
  else{S.authError='Incorrect admin password';renderApp();}
};

window.doSignup=async()=>{
  const email=$('a-em')?.value?.trim(),pw=$('a-pw')?.value,name=$('a-nm')?.value?.trim()||'',company=$('a-co')?.value?.trim()||'';
  if(!email||!pw){S.authError='Please enter email and password';renderApp();return;}
  if(pw.length<6){S.authError='Password must be at least 6 characters';renderApp();return;}
  S.authLoading=true;S.authError='';renderApp();
  try{
    const res=await fetch(`${API}/api/auth/signup`,{method:'POST',headers:{'Content-Type':'application/json'},mode:'cors',body:JSON.stringify({email,password:pw,name,company})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Signup failed');
    S.authUser={email,name,company};S.authToken=data.token||null;S.subStatus='trial';S.trialStart=Date.now();
    if(name)S.profile.name=name;if(company)S.profile.company=company;
    DB.set('authUser',S.authUser);DB.set('authToken',S.authToken);DB.set('subStatus','trial');DB.set('trialStart',S.trialStart);DB.set('profile',S.profile);
    S.phase='pin';
  }catch(e){S.authError=e.message||'Signup failed. Try again.';}
  S.authLoading=false;renderApp();
};

window.doLogin=async()=>{
  const email=$('a-em')?.value?.trim(),pw=$('a-pw')?.value;
  if(!email||!pw){S.authError='Please enter email and password';renderApp();return;}
  S.authLoading=true;S.authError='';renderApp();
  try{
    const res=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},mode:'cors',body:JSON.stringify({email,password:pw})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Login failed');
    S.authUser=data.user||{email};S.authToken=data.token||null;S.subStatus=data.subStatus||'trial';S.trialStart=data.trialStart||Date.now();
    if(S.authUser.name)S.profile.name=S.authUser.name;if(S.authUser.company)S.profile.company=S.authUser.company;
    DB.set('authUser',S.authUser);DB.set('authToken',S.authToken);DB.set('subStatus',S.subStatus);DB.set('trialStart',S.trialStart);DB.set('profile',S.profile);
    S.phase='pin';
  }catch(e){S.authError=e.message||'Login failed. Check your details.';}
  S.authLoading=false;renderApp();
};

window.doLogout=()=>{
  if(!confirm('Log out of TradeFlow AI?'))return;
  ['authUser','authToken','isAdmin','subStatus','trialStart'].forEach(k=>DB.set(k,null));
  S.authUser=null;S.authToken=null;S.isAdmin=false;S.subStatus=null;S.phase='auth';renderApp();
};

const pinDots=(shake=false)=>[0,1,2,3].map(i=>`<div style="width:16px;height:16px;border-radius:50%;border:2px solid ${i<pinBuf.length?(shake?'#f87171':'#fff'):'rgba(255,255,255,.3)'};background:${i<pinBuf.length?(shake?'#f87171':'#fff'):'transparent'};transform:${i<pinBuf.length?'scale(1.1)':'scale(1)'};transition:all .15s"></div>`).join('');
window.pk=k=>{

window.toggleVoice=()=>{

  if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    voiceSR=new SR();voiceSR.continuous=false;voiceSR.interimResults=true;voiceSR.lang='en-NZ';

        const active=S.screen===tab.id||(tab.id==='more'&&!MAIN.includes(S.screen));
        const col=active?t.d:'#52525b';
        return`<button onclick="go('${tab.id}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;background:none;border:none;cursor:pointer"><span style="color:${col}">${ic(tab.i,20,col)}</span><span style="font-size:10px;font-weight:700;color:${col}">${tab.l}</span></button>`;
      }).join('')}
    </div>
  </div>`;
};

// ─── BOOT ─────────────────────────────────────────────────
window.speechSynthesis?.getVoices?.();
renderApp();
</script>
</body>
