<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TradeFlow AI — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #020817;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: Poppins, Arial, sans-serif;
    }

    .logo-wrap { text-align: center; color: white; }

    .icon {
      width: 210px; height: 210px;
      margin: 0 auto 28px;
      border-radius: 46px;
      background: linear-gradient(145deg, #1565ff 0%, #0d3f9e 55%, #071b3d 100%);
      display: grid; place-items: center;
      box-shadow: 0 0 55px rgba(21, 101, 255, 0.45);
    }

    .tf { width: 145px; height: 105px; position: relative; }

    .t-top {
      position: absolute; left: 5px; top: 4px;
      width: 92px; height: 28px;
      background: white;
      border-radius: 18px 4px 18px 4px;
      transform: skewX(-16deg);
    }
    .t-stem {
      position: absolute; left: 35px; top: 25px;
      width: 32px; height: 76px;
      background: white;
      border-radius: 4px 4px 12px 12px;
      transform: skewX(-16deg);
    }
    .f-top {
      position: absolute; left: 76px; top: 38px;
      width: 68px; height: 24px;
      background: #1db7ff;
      border-radius: 18px 4px 18px 4px;
      transform: skewX(-16deg);
    }
    .f-mid {
      position: absolute; left: 67px; top: 68px;
      width: 58px; height: 24px;
      background: #168dff;
      border-radius: 18px 4px 18px 4px;
      transform: skewX(-16deg);
    }

    .wordmark {
      font-size: 72px; font-weight: 800;
      letter-spacing: -3px; line-height: 1;
    }
    .trade { color: #ffffff; }
    .flow  { color: #0d8cff; }
    .ai {
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 12px; width: 58px; height: 52px;
      border-radius: 9px;
      background: linear-gradient(145deg, #168dff, #0d6cff);
      color: white; font-size: 30px; font-weight: 800;
      vertical-align: middle;
      box-shadow: 0 0 22px rgba(22, 141, 255, 0.7);
    }
    .tagline {
      margin-top: 18px; font-size: 17px;
      letter-spacing: 8px; color: #94a3b8;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="icon">
      <div class="tf">
        <div class="t-top"></div>
        <div class="t-stem"></div>
        <div class="f-top"></div>
        <div class="f-mid"></div>
      </div>
    </div>
    <div class="wordmark">
      <span class="trade">Trade</span><span class="flow">Flow</span><span class="ai">AI</span>
    </div>
    <div class="tagline">Built on the tools. Built for the tools.</div>
  </div>
</body>
</html>
